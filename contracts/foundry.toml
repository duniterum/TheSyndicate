[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
# buy() exceeds the legacy stack limit; the IR pipeline resolves it and yields
# better-optimized production bytecode. Required to compile this codebase.
via_ir = true
# Conservative target for Avalanche C-Chain compatibility (no PUSH0/transient deps).
# Revisit at deploy time per the deployment checklist.
evm_version = "paris"
# Explicit remappings (auto-detection also works; pinned here for the reviewer).
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]
# Deploy.s.sol reads constructor params via vm.readFile from a DEPLOY_PARAMS path
# (default script/deploy-params.json; rehearsal uses deploy-params.v2b.rehearsal.json).
# Grant read to the whole ./script dir so the explicit path override is honored.
fs_permissions = [{ access = "read", path = "./script" }]

[fuzz]
runs = 512

[invariant]
runs = 256
depth = 32
